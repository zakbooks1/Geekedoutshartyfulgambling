<!DOCTYPE html>
<html>
<head>
  <title>Crypto Casino</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #020617, #000);
      color: white;
      text-align: center;
    }

    h1 {
      margin: 15px;
      font-size: 38px;
      color: #22c55e;
    }

    #balanceBox {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      padding: 10px 20px;
      border-radius: 12px;
      display: inline-block;
      margin-bottom: 20px;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      padding: 20px;
    }

    .card {
      width: 160px;
      height: 100px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.08);
      box-shadow: 0 0 20px #22c55e;
    }

    .game { display: none; }
    .active { display: block; }

    button {
      padding: 10px 15px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    #slots span {
      font-size: 50px;
      margin: 5px;
    }

    #multiplier {
      font-size: 40px;
      color: #22c55e;
    }

    #backBtn {
      background: #ef4444;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h1>💎 Crypto Casino</h1>

<div id="balanceBox">
  Balance: <span id="balance">0.00000</span> BTC
</div>

<!-- LOBBY -->
<div id="lobby">
  <div class="grid">
    <div class="card" onclick="openGame('slots')">🎰 Slots</div>
    <div class="card" onclick="openGame('crash')">💥 Crash</div>
    <div class="card" onclick="openGame('coin')">🪙 Coin Flip</div>
  </div>
</div>

<!-- SLOTS -->
<div id="slots" class="game">
  <h2>Slots</h2>
  <div id="slots">
    <span id="r1">🍒</span>
    <span id="r2">🍋</span>
    <span id="r3">🍊</span>
  </div>
  <br>
  <button onclick="spin()">Spin</button>
  <p id="slotResult"></p>
  <button id="backBtn" onclick="back()">Back</button>
</div>

<!-- CRASH -->
<div id="crash" class="game">
  <h2>Crash</h2>
  <div id="multiplier">1.00x</div>
  <button onclick="startCrash()">Start</button>
  <button onclick="cashOut()">Cash Out</button>
  <p id="crashResult"></p>
  <button id="backBtn" onclick="back()">Back</button>
</div>

<!-- COIN -->
<div id="coin" class="game">
  <h2>Coin Flip</h2>
  <button onclick="coin('heads')">Heads</button>
  <button onclick="coin('tails')">Tails</button>
  <p id="coinResult"></p>
  <button id="backBtn" onclick="back()">Back</button>
</div>

<script>
let balance = localStorage.getItem("btc")
  ? parseFloat(localStorage.getItem("btc"))
  : 0.01;

function save() {
  document.getElementById("balance").innerText = balance.toFixed(5);
  localStorage.setItem("btc", balance);
}
save();

// NAV
function openGame(g) {
  document.getElementById("lobby").style.display = "none";
  document.querySelectorAll(".game").forEach(x => x.classList.remove("active"));
  document.getElementById(g).classList.add("active");
}
function back() {
  document.getElementById("lobby").style.display = "block";
  document.querySelectorAll(".game").forEach(x => x.classList.remove("active"));
}

// SLOTS (animated)
function spin() {
  let items = ["🍒","🍋","🍊","💎","⭐"];

  let i = 0;
  let interval = setInterval(() => {
    r1.innerText = items[Math.floor(Math.random()*items.length)];
    r2.innerText = items[Math.floor(Math.random()*items.length)];
    r3.innerText = items[Math.floor(Math.random()*items.length)];
    i++;
    if (i > 15) {
      clearInterval(interval);

      if (r1.innerText === r2.innerText && r2.innerText === r3.innerText) {
        balance += 0.002;
        slotResult.innerText = "JACKPOT!";
      } else {
        balance -= 0.0005;
        slotResult.innerText = "Lose";
      }
      save();
    }
  }, 80);
}

// COIN
function coin(c) {
  let r = Math.random() < 0.5 ? "heads" : "tails";

  if (c === r) {
    balance += 0.001;
    coinResult.innerText = "Win!";
  } else {
    balance -= 0.001;
    coinResult.innerText = "Lose!";
  }
  save();
}

// CRASH
let crashRunning = false;
let multi = 1;
let crashPoint = 0;

function startCrash() {
  if (crashRunning) return;

  crashRunning = true;
  multi = 1;
  crashPoint = Math.random() * 3 + 1;

  let loop = setInterval(() => {
    multi += 0.05;
    multiplier.innerText = multi.toFixed(2) + "x";

    if (multi >= crashPoint) {
      clearInterval(loop);
      crashRunning = false;
      crashResult.innerText = "CRASHED!";
      balance -= 0.002;
      save();
    }
  }, 100);
}

function cashOut() {
  if (!crashRunning) return;

  crashRunning = false;
  balance += multi * 0.001;
  crashResult.innerText = "Cashed out at " + multi.toFixed(2) + "x";
  save();
}
</script>

</body>
</html>
