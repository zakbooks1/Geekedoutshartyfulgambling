<!DOCTYPE html>
<html>
<head>
  <title>Fake Casino</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .menu button {
      margin: 5px;
      padding: 10px 15px;
      font-size: 16px;
      cursor: pointer;
    }

    .game {
      display: none;
      margin-top: 20px;
    }

    .active {
      display: block;
    }

    button {
      background: #22c55e;
      border: none;
      color: white;
      border-radius: 8px;
    }

    .slot {
      font-size: 40px;
      margin: 10px;
    }
  </style>
</head>
<body>

<h1>🎰 Fake Casino</h1>
<p>Balance: $<span id="balance">1000</span></p>

<div class="menu">
  <button onclick="showGame('coin')">Coin Flip</button>
  <button onclick="showGame('roulette')">Roulette</button>
  <button onclick="showGame('slots')">Slots</button>
</div>

<!-- COIN FLIP -->
<div id="coin" class="game active">
  <h2>Coin Flip</h2>
  <button onclick="coinFlip('heads')">Heads</button>
  <button onclick="coinFlip('tails')">Tails</button>
  <p id="coinResult"></p>
</div>

<!-- ROULETTE -->
<div id="roulette" class="game">
  <h2>Roulette</h2>
  <button onclick="roulette('red')">Red</button>
  <button onclick="roulette('black')">Black</button>
  <p id="rouletteResult"></p>
</div>

<!-- SLOTS -->
<div id="slots" class="game">
  <h2>Slots</h2>
  <div class="slot" id="slot1">🍒</div>
  <div class="slot" id="slot2">🍋</div>
  <div class="slot" id="slot3">🍊</div>
  <br>
  <button onclick="spinSlots()">Spin</button>
  <p id="slotResult"></p>
</div>

<script>
let balance = 1000;

function updateBalance() {
  document.getElementById("balance").innerText = balance;
}

function showGame(game) {
  document.querySelectorAll(".game").forEach(g => g.classList.remove("active"));
  document.getElementById(game).classList.add("active");
}

// COIN FLIP
function coinFlip(choice) {
  let result = Math.random() < 0.5 ? "heads" : "tails";

  if (choice === result) {
    balance += 100;
    document.getElementById("coinResult").innerText = "You WON!";
  } else {
    balance -= 100;
    document.getElementById("coinResult").innerText = "You lost!";
  }

  updateBalance();
}

// ROULETTE
function roulette(choice) {
  let result = Math.random() < 0.5 ? "red" : "black";

  if (choice === result) {
    balance += 200;
    document.getElementById("rouletteResult").innerText = "WIN! It was " + result;
  } else {
    balance -= 100;
    document.getElementById("rouletteResult").innerText = "Lost! It was " + result;
  }

  updateBalance();
}

// SLOTS
function spinSlots() {
  let symbols = ["🍒","🍋","🍊","⭐","💎"];

  let s1 = symbols[Math.floor(Math.random()*symbols.length)];
  let s2 = symbols[Math.floor(Math.random()*symbols.length)];
  let s3 = symbols[Math.floor(Math.random()*symbols.length)];

  document.getElementById("slot1").innerText = s1;
  document.getElementById("slot2").innerText = s2;
  document.getElementById("slot3").innerText = s3;

  if (s1 === s2 && s2 === s3) {
    balance += 500;
    document.getElementById("slotResult").innerText = "JACKPOT!";
  } else {
    balance -= 50;
    document.getElementById("slotResult").innerText = "Try again";
  }

  updateBalance();
}
</script>

</body>
</html>
